<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credencial Digital</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #f0f2f5;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
        }
        .card {
            background-color: #2e7d32; /* El verde corporativo */
            color: white;
            width: 95%; max-width: 360px;
            border-radius: 16px; padding: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            box-sizing: border-box;
        }
        /* DISEÑO BASE: Horizontal (Para usuario 0 y otros con logos cuadrados) */
        .company-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 30px;
        }
        /* DISEÑO EXCLUSIVO USER 500: Vertical/Stacked */
        .company-header.stacked {
            flex-direction: column;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 25px;
        }
        .logo-empresa {
            height: 26px;
            max-width: 110px;
            object-fit: contain;
            background-color: white;
            padding: 3px 6px;
            border-radius: 4px;
        }
        /* MODIFICACIÓN: Logo transparente y sin recuadro blanco para el usuario 500 */
        .logo-empresa.rectangular {
            height: 38px;
            max-width: 180px;
            width: auto;
            background-color: transparent; /* Remueve el fondo blanco */
            padding: 0; /* Remueve el recuadro interno */
            border-radius: 0;
        }
        .company-name {
            font-size: 19px;
            font-weight: bold;
            letter-spacing: 0.3px;
        }
        /* Datos a la izquierda y foto de perfil a la derecha */
        .user-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            gap: 15px;
        }
        .user-info {
            display: flex;
            flex-direction: column;
            flex: 1;
        }
        .cargo {
            font-size: 11px;
            text-transform: uppercase;
            color: #a5d6a7;
            font-weight: 600;
            letter-spacing: 0.8px;
        }
        .nombre {
            font-size: 26px;
            font-weight: bold;
            margin: 4px 0 0 0;
            line-height: 1.2;
        }
        .profile-pic {
            width: 85px;
            height: 85px;
            border-radius: 8px;
            object-fit: cover;
            background-color: #fff;
            flex-shrink: 0;
        }
        /* Campos de texto inferiores */
        .label { 
            font-size: 10px; 
            text-transform: uppercase; 
            color: #a5d6a7; 
            margin-bottom: 2px; 
            letter-spacing: 1px; 
        }
        .info-group { margin-bottom: 15px; }
        .info-value { font-size: 14px; letter-spacing: 0.3px; word-break: break-all; }
        
        /* Contenedor blanco para el QR */
        .qr-container {
            background-color: white; padding: 15px;
            border-radius: 12px; margin-top: 25px;
            display: flex; justify-content: center; align-items: center;
        }
        .qr-container img, .qr-container canvas { width: 210px; height: 210px; object-fit: contain; }
        .error-msg { color: #ff5252; background: white; padding: 20px; border-radius: 10px; text-align: center; }
    </style>
</head>
<body>

    <div id="app">Cargando credencial...</div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('user');

        if (!userId) {
            document.getElementById('app').innerHTML = '<div class="error-msg">❌ Error: Especifica un usuario en la URL (?user=0 o ?user=500)</div>';
        } else {
            fetch('usuarios.json')
                .then(response => response.json())
                .then(usuarios => {
                    const usuario = usuarios.find(u => u.id.toString() === userId);

                    if (!usuario) {
                        document.getElementById('app').innerHTML = '<div class="error-msg">❌ Usuario no encontrado en el sistema.</div>';
                        return;
                    }

                    // Cabecera Dinámica
                    let cabeceraHTML = '';
                    if (usuario.id.toString() === '500') {
                        cabeceraHTML = `
                            <div class="company-header stacked">
                                <img class="logo-empresa rectangular" src="${usuario.logo}" alt="Logo">
                                <div class="company-name">Estudio Hernández</div>
                            </div>
                        `;
                    } else {
                        cabeceraHTML = `
                            <div class="company-header">
                                <img class="logo-empresa" src="${usuario.logo}" alt="Logo">
                                <div class="company-name">Estudio Hernández</div>
                            </div>
                        `;
                    }

                    let qrElementHTML = usuario.usar_foto_qr 
                        ? `<img src="${usuario.qr_pure}" alt="Código QR">` 
                        : `<canvas id="qr"></canvas>`;

                    document.getElementById('app').innerHTML = `
                        <div class="card">
                            ${cabeceraHTML}
                            
                            <div class="user-row">
                                <div class="user-info">
                                    <div class="cargo">${usuario.rol} ${usuario.areas_practica.length ? `• ${usuario.areas_practica.join(', ')}` : ''}</div>
                                    <div class="nombre">${usuario.nombre} ${usuario.apellido}</div>
                                </div>
                                <img class="profile-pic" src="${usuario.foto}" alt="Perfil">
                            </div>
                            
                            <div class="info-group">
                                <div class="label">EMAIL</div>
                                <div class="info-value">${usuario.email}</div>
                            </div>
                            
                            <div class="qr-container">
                                ${qrElementHTML}
                            </div>
                        </div>
                    `;

                    if (!usuario.usar_foto_qr) {
                        new QRious({
                            element: document.getElementById('qr'),
                            value: usuario.qr_pure,
                            size: 210,
                            level: 'M'
                        });
                    }
                })
                .catch(err => {
                    document.getElementById('app').innerHTML = '<div class="error-msg">❌ Error al cargar la base de datos.</div>';
                    console.error(err);
                });
        }
    </script>
</body>
</html>
